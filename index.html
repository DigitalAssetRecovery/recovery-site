<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DART | Secure Asset Recovery Portal</title>
    <style>
        :root { --primary: #1a2a6c; --secondary: #3498db; --success: #28a745; --danger: #d9534f; --gray: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; border-top: 6px solid var(--primary); }
        .dashboard-container { display: none; max-width: 850px; width: 95%; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border-top: 6px solid var(--primary); margin: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn-primary { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-outline { width: 100%; padding: 10px; background: none; color: var(--primary); border: 1px solid var(--primary); border-radius: 6px; cursor: pointer; margin-top: 15px; font-size: 0.9em; }
        header { border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .status-badge { background: var(--success); color: white; padding: 6px 14px; border-radius: 20px; font-size: 0.8em; font-weight: bold; text-transform: uppercase; }
        .case-info { background: #f8f9fa; padding: 15px; border-left: 5px solid var(--secondary); margin-bottom: 20px; text-align: left; }
        .progress-bar-bg { background: #e9ecef; border-radius: 25px; height: 28px; width: 100%; position: relative; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, var(--primary), var(--success)); height: 100%; width: 0%; transition: width 1.5s ease-in-out; }
        .financials { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .stat { padding: 15px; border: 1px solid #eee; border-radius: 8px; text-align: left; }
        .wallet-box { background: var(--primary); color: white; padding: 20px; border-radius: 8px; margin-top: 20px; text-align: center; }
        .wallet-address { font-family: monospace; background: rgba(255,255,255,0.1); padding: 10px; display: block; margin: 10px 0; word-break: break-all; border: 1px dashed #fff; }
        
        /* Table Styles */
        .history-section { margin-top: 30px; text-align: left; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th { background: #f8f9fa; padding: 10px; text-align: left; border-bottom: 2px solid #eee; color: #7f8c8d; }
        td { padding: 12px 10px; border-bottom: 1px solid #eee; }
        .check-mark { color: var(--success); font-weight: bold; }

        #fileCaseForm { display: none; }
    </style>
</head>
<body>

    <div id="loginGate" class="card">
        <div style="font-weight: 800; font-size: 2em; color: var(--primary);">DART</div>
        <p style="color: #6c757d; margin-bottom: 30px;">Secure Beneficiary Access</p>
        <div id="loginInputs">
            <input type="text" id="caseID" placeholder="Case DAR Number">
            <input type="password" id="pin" placeholder="Secure Access PIN">
            <button class="btn-primary" onclick="checkLogin()">Verify & Enter Portal</button>
            <button class="btn-outline" onclick="showFileForm()">New User? File a Case</button>
            <p id="errorMsg" style="color:red; display:none; margin-top:10px;">Access Denied.</p>
        </div>
        <div id="fileCaseForm">
            <h3 style="color: var(--primary);">Registration</h3>
            <input type="text" placeholder="Full Legal Name">
            <input type="email" placeholder="Contact Email">
            <button class="btn-primary" onclick="submitCase()">Submit for Review</button>
            <button class="btn-outline" onclick="showLogin()">Back to Login</button>
        </div>
    </div>

    <div id="dashboard" class="dashboard-container">
        <header>
            <div style="font-weight: 800; color: var(--primary);">DART | FORENSIC TERMINAL</div>
            <div class="status-badge">Node Active</div>
        </header>

        <div class="case-info">
            <strong>FILE:</strong> <span id="displayID"></span> | <strong>BENEFICIARY:</strong> <span id="displayName"></span>
        </div>

        <div style="text-align:left;">
            <label><strong>Progress: <span id="displayPct"></span></strong></label>
            <div class="progress-bar-bg"><div id="progressFill" class="progress-fill"></div></div>
        </div>

        <div class="financials">
            <div class="stat"><strong>Total Fee:</strong><br><span id="displayTotal"></span></div>
            <div class="stat" style="color: var(--success);"><strong>Paid:</strong><br><span id="displayPaid"></span></div>
            <div class="stat" style="color: var(--danger);"><strong>Balance:</strong><br><span id="displayBal"></span></div>
            <div class="stat"><strong>Deadline:</strong><br><span id="displayDeadline"></span></div>
        </div>

        <div class="wallet-box">
            <small>SETTLEMENT NODE ADDRESS</small>
            <span class="wallet-address" id="displayWallet"></span>
        </div>

        <div class="history-section">
            <h4 style="margin-bottom: 5px; color: var(--primary);">Recent Activity Log</h4>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Amount</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>March 05, 2026</td>
                        <td>Initial Partial Signal</td>
                        <td>$1,000.00</td>
                        <td class="check-mark">✔ Verified</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const users = {
            "dar-2026-8942": {
                pin: "2026",
                name: "MARJORIE [LAST NAME]",
                pct: "92%",
                total: "$7,250.00",
                paid: "$1,000.00",
                bal: "$6,250.00",
                deadline: "12 Days Remaining",
                wallet: "bc1qf0k7qfvm2f4vpg0ae3sfgyywtygue6sm370g6n"
            }
        };

        function checkLogin() {
            const inputID = document.getElementById('caseID').value.toLowerCase().trim();
            const inputPin = document.getElementById('pin').value.trim();
            const user = users[inputID];

            if (user && user.pin === inputPin) {
                document.getElementById('loginGate').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('displayID').innerText = inputID.toUpperCase();
                document.getElementById('displayName').innerText = user.name;
                document.getElementById('displayPct').innerText = user.pct;
                document.getElementById('displayTotal').innerText = user.total;
                document.getElementById('displayPaid').innerText = user.paid;
                document.getElementById('displayBal').innerText = user.bal;
                document.getElementById('displayDeadline').innerText = user.deadline;
                document.getElementById('displayWallet').innerText = user.wallet;
                setTimeout(() => { document.getElementById('progressFill').style.width = user.pct; }, 100);
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }
        function showFileForm() { document.getElementById('loginInputs').style.display = 'none'; document.getElementById('fileCaseForm').style.display = 'block'; }
        function showLogin() { document.getElementById('fileCaseForm').style.display = 'none'; document.getElementById('loginInputs').style.display = 'block'; }
        function submitCase() { alert("Application Received."); showLogin(); }
    </script>
</body>
</html>
