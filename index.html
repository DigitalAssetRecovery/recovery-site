<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Asset Recovery | Expert Blockchain Forensics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050508; color: white; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-3xl mx-auto text-center">
        <h1 class="text-4xl md:text-6xl font-bold mb-4 bg-gradient-to-r from-cyan-400 to-blue-600 bg-clip-text text-transparent">
            Digital Asset Recovery
        </h1>
        <p class="text-gray-400 text-lg mb-12">Professional Forensic Investigation & Blockchain Fund Recovery</p>

        <div class="glass-card p-8 rounded-2xl text-left">
            <h2 class="text-2xl font-semibold mb-6">Initial Case Assessment</h2>
            
            <form action="https://formsubmit.co/recoveryspecialistdigitalasset@gmail.com" method="POST">
                <input type="hidden" name="_next" value="https://digitalassetrecovery.github.io/recovery-site/">
                <input type="hidden" name="_captcha" value="false">

                <div class="space-y-4">
                    <input type="text" name="name" placeholder="Full Name" required 
                           class="w-full bg-black/50 border border-white/10 p-4 rounded-lg focus:outline-none focus:border-cyan-500 transition">
                    
                    <input type="email" name="email" placeholder="Contact Email" required 
                           class="w-full bg-black/50 border border-white/10 p-4 rounded-lg focus:outline-none focus:border-cyan-500 transition">
                    
                    <textarea name="case_details" placeholder="Describe the loss (Platform, Amount, Date...)" required 
                              class="w-full bg-black/50 border border-white/10 p-4 rounded-lg h-32 focus:outline-none focus:border-cyan-500 transition"></textarea>
                    
                    <button type="submit" 
                            class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-bold py-4 rounded-lg hover:opacity-90 transition shadow-lg shadow-cyan-500/20">
                        Submit Case for Review
                    </button>
                </div>
            </form>
        </div>

        <p class="mt-8 text-sm text-gray-500">Security Verified & Encrypted Transmission</p>
    </div>

</body>
</html>
