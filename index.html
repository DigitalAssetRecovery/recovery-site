<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DART | System Processing</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .card { max-width: 480px; margin: 0 auto; background: #fff; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; border-top: 6px solid #f39c12; }
        .loading-banner { background: #fff9e6; color: #d35400; padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #f39c12; font-size: 0.85em; }
        .content { padding: 25px; text-align: center; }
        
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #1e2a5e; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .status-text { font-size: 1.1em; font-weight: bold; color: #1e2a5e; margin-bottom: 10px; }
        .sub-text { font-size: 0.85em; color: #666; margin-bottom: 25px; line-height: 1.4; }

        .progress-container { background: #eee; height: 10px; border-radius: 5px; margin-bottom: 30px; overflow: hidden; }
        .progress-fill { width: 98.4%; height: 100%; background: #f39c12; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .wallet-display { background: #000; color: #00ff00; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 0.9em; word-break: break-all; margin-bottom: 20px; border: 1px solid #333; }
        .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-top: 1px solid #eee; font-size: 0.9em; }
        .label { color: #888; text-transform: uppercase; font-size: 0.75em; }
        .val { font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div style="background:#1e2a5e; color:#fff; padding:15px; text-align:center;">
        <h3 style="margin:0; font-size:1em;">DART FORENSIC TERMINAL</h3>
    </div>
    
    <div class="loading-banner">⚠️ SYSTEM STATUS: NETWORK CONGESTION / SYNCING</div>

    <div class="content">
        <div class="spinner"></div>
        <div class="status-text">Synchronizing Node Signal...</div>
        <p class="sub-text">
            Mapping transaction to Case ID #DAR-2026-8942.<br>
            Current Settlement Node:
        </p>

        <div class="wallet-display">
            bc1qcungyghpf4hayugatm8wtfheek2uyhwvp7waxe
        </div>

        <div class="progress-container">
            <div class="progress-fill"></div>
        </div>

        <div class="stat-row">
            <span class="label">Total Verified Paid</span>
            <span class="val" style="color: #27ae60;">$2,500.00</span>
        </div>
        <div class="stat-row">
            <span class="label">Sync Progress</span>
            <span class="val">98.4%</span>
        </div>
        <div class="stat-row" style="border-bottom: 1px solid #eee; margin-bottom: 10px;">
            <span class="label">Manual Override</span>
            <span class="val" style="color: #f39c12;">ACTIVE</span>
        </div>
    </div>
</div>

</body>
</html>
